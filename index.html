<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planing Perbaikan Kebocoran Coolant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; }
    .app { min-height: 100vh; padding: 32px 16px; }
    .card {
      max-width: 1100px; margin: 0 auto; background: #fff;
      border-radius: 12px; box-shadow: 0 4px 24px #b0bec540;
      padding: 28px 28px 36px;
    }
    .title-area { text-align: center; margin-bottom: 24px; }
    .title-text {
      font-size: 18px; font-weight: 700; color: #1a237e;
      cursor: pointer; display: inline-block;
      border-bottom: 2px dashed transparent; transition: border 0.2s;
    }
    .title-text:hover { border-bottom-color: #29b6f6; }
    .title-input {
      font-size: 18px; font-weight: 700; border: none;
      border-bottom: 2px solid #29b6f6; outline: none;
      text-align: center; width: 80%; color: #1a237e; background: transparent;
    }
    .legend {
      display: flex; gap: 20px; margin-bottom: 14px;
      justify-content: flex-end; font-size: 13px; align-items: center; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-box { width: 18px; height: 14px; border-radius: 3px; display: inline-block; }
    .legend-tip { color: #90a4ae; font-size: 12px; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; min-width: 820px; width: 100%; }
    th {
      border: 1px solid #cfd8dc; background: #e3f2fd;
      padding: 6px 8px; text-align: center;
      font-size: 13px; font-weight: 600; color: #1a237e;
    }
    .actions { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
    .btn {
      color: #fff; border: none; border-radius: 6px;
      padding: 8px 18px; cursor: pointer; font-size: 14px;
      font-weight: 600; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-del {
      color: #fff; background: #ef5350; border: none; border-radius: 6px;
      padding: 4px 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .btn-del:hover { background: #c62828; }
    .tip { font-size: 11px; color: #b0bec5; margin-top: 18px; text-align: right; }
    .item-name { cursor: pointer; border-bottom: 1px dashed #90a4ae; }
    .item-input {
      width: 100%; border: 1px solid #29b6f6; border-radius: 4px;
      padding: 2px 6px; font-size: 13px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const TIME_SLOTS = ["13.00","13.30","14.00","14.30","15.00","15.30","16.00","16.30","17.00","17.30","18.00","18.30"];

const INIT_ROWS = [
  { id:1, item:"Lepas Spindle",             plan:["13.00","13.30","14.00","14.30"], act:[] },
  { id:2, item:"Ganti Seal Spindle collant",plan:["14.30","15.00"],                act:[] },
  { id:3, item:"pasang Spindle",            plan:["15.00","15.30","16.00"],        act:[] },
  { id:4, item:"Centering pin",             plan:["16.00","16.30"],                act:[] },
  { id:5, item:"Tes Semburan Coolant",      plan:["17.00"],                        act:[] },
  { id:6, item:"Trial Bubut",               plan:["17.30"],                        act:[] },
];

const PLAN_CLR  = "#29b6f6";
const ACT_CLR   = "#66bb6a";

// Inline styles to avoid any CSS specificity conflict
const tdBase = {
  border: "1px solid #cfd8dc",
  width: 60,
  height: 28,
  cursor: "pointer",
  userSelect: "none",
  transition: "background-color 0.12s",
  padding: 0,
};

function Cell({ filled, color, onClick, onMouseDown, onMouseEnter, onMouseLeave }) {
  const [hov, setHov] = useState(false);
  let bg = "#ffffff";
  if (filled) bg = color;
  if (!filled && hov) bg = "#e0e0e0";
  if (filled && hov) bg = color + "cc";
  return (
    <td
      style={{ ...tdBase, backgroundColor: bg }}
      onClick={onClick}
      onMouseDown={onMouseDown}
      onMouseEnter={() => { setHov(true); onMouseEnter && onMouseEnter(); }}
      onMouseLeave={() => { setHov(false); onMouseLeave && onMouseLeave(); }}
    />
  );
}

function App() {
  const [title, setTitle]         = useState("Planing Perbaikan Kebocoran Coolant di Spindle DR 303");
  const [editTitle, setEditTitle] = useState(false);
  const [rows, setRows]           = useState(INIT_ROWS);
  const [drag, setDrag]           = useState(null);
  const [editId, setEditId]       = useState(null);
  const [draft, setDraft]         = useState("");

  function toggle(id, type, slot) {
    setRows(p => p.map(r => {
      if (r.id !== id) return r;
      const a = r[type];
      return { ...r, [type]: a.includes(slot) ? a.filter(s=>s!==slot) : [...a, slot] };
    }));
  }

  function onDown(id, type, slot) {
    const row = rows.find(r=>r.id===id);
    const filling = !row[type].includes(slot);
    setDrag({ id, type, filling });
    setRows(p => p.map(r => {
      if (r.id !== id) return r;
      const a = r[type];
      return { ...r, [type]: filling ? (a.includes(slot)?a:[...a,slot]) : a.filter(s=>s!==slot) };
    }));
  }

  function onEnter(id, type, slot) {
    if (!drag || drag.id!==id || drag.type!==type) return;
    setRows(p => p.map(r => {
      if (r.id !== id) return r;
      const a = r[type];
      return drag.filling
        ? { ...r, [type]: a.includes(slot)?a:[...a,slot] }
        : { ...r, [type]: a.filter(s=>s!==slot) };
    }));
  }

  function addRow() {
    const id = Date.now();
    setRows(p => [...p, { id, item:"Item baru", plan:[], act:[] }]);
    setEditId(id); setDraft("Item baru");
  }

  function delRow(id) { setRows(p=>p.filter(r=>r.id!==id)); }

  function saveItem(id) {
    setRows(p=>p.map(r=>r.id===id?{...r,item:draft}:r));
    setEditId(null);
  }

  function exportCSV() {
    const hdr = ["Item kerja","Type",...TIME_SLOTS].join(",");
    const body = rows.flatMap(r=>[
      [r.item,"Plan",...TIME_SLOTS.map(s=>r.plan.includes(s)?"1":"0")].join(","),
      [r.item,"Act", ...TIME_SLOTS.map(s=>r.act.includes(s) ?"1":"0")].join(","),
    ]);
    const blob = new Blob([[hdr,...body].join("\n")],{type:"text/csv"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download="planing.csv"; a.click();
  }

  const cellTd = (extra={}) => ({
    border:"1px solid #cfd8dc", padding:"4px 8px",
    fontSize:13, verticalAlign:"middle", ...extra
  });

  return (
    <div className="app" onMouseUp={()=>setDrag(null)}>
      <div className="card">

        {/* Title */}
        <div className="title-area">
          {editTitle
            ? <input className="title-input" value={title} autoFocus
                onChange={e=>setTitle(e.target.value)}
                onBlur={()=>setEditTitle(false)}
                onKeyDown={e=>e.key==="Enter"&&setEditTitle(false)} />
            : <h1 className="title-text" onClick={()=>setEditTitle(true)} title="Klik untuk edit judul">
                {title} ✏️
              </h1>
          }
        </div>

        {/* Legend */}
        <div className="legend">
          <span className="legend-item">
            <span className="legend-box" style={{background:PLAN_CLR}}/> Plan
          </span>
          <span className="legend-item">
            <span className="legend-box" style={{background:ACT_CLR}}/> Act
          </span>
          <span className="legend-tip">Klik / drag sel untuk mengisi</span>
        </div>

        {/* Table */}
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th rowSpan="2" style={{width:160}}>Item kerja</th>
                <th rowSpan="2" style={{width:52}}>Type</th>
                <th colSpan={TIME_SLOTS.length}>Jam</th>
                <th rowSpan="2" style={{width:60}}>Aksi</th>
              </tr>
              <tr>
                {TIME_SLOTS.map(s=><th key={s} style={{width:60,fontWeight:500,fontSize:12}}>{s}</th>)}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, idx) => {
                const bg = idx%2===0 ? "#f9fbe7" : "#ffffff";
                return (
                  <React.Fragment key={row.id}>
                    {/* Plan */}
                    <tr>
                      <td rowSpan="2" style={{...cellTd({width:160,background:bg})}}>
                        {editId===row.id
                          ? <input className="item-input" value={draft} autoFocus
                              onChange={e=>setDraft(e.target.value)}
                              onBlur={()=>saveItem(row.id)}
                              onKeyDown={e=>e.key==="Enter"&&saveItem(row.id)} />
                          : <span className="item-name"
                              onClick={()=>{setEditId(row.id);setDraft(row.item);}}
                              title="Klik untuk edit nama">{row.item}</span>
                        }
                      </td>
                      <td style={{...cellTd({width:52,background:"#eceff1",textAlign:"center",color:"#546e7a",fontSize:12})}}>Plan</td>
                      {TIME_SLOTS.map(s=>(
                        <Cell key={s}
                          filled={row.plan.includes(s)}
                          color={PLAN_CLR}
                          onClick={()=>toggle(row.id,"plan",s)}
                          onMouseDown={()=>onDown(row.id,"plan",s)}
                          onMouseEnter={()=>onEnter(row.id,"plan",s)}
                        />
                      ))}
                      <td rowSpan="2" style={{...cellTd({width:60,textAlign:"center",background:bg})}}>
                        <button className="btn-del" onClick={()=>delRow(row.id)}>✕</button>
                      </td>
                    </tr>
                    {/* Act */}
                    <tr>
                      <td style={{...cellTd({width:52,background:"#eceff1",textAlign:"center",color:"#546e7a",fontSize:12})}}>Act</td>
                      {TIME_SLOTS.map(s=>(
                        <Cell key={s}
                          filled={row.act.includes(s)}
                          color={ACT_CLR}
                          onClick={()=>toggle(row.id,"act",s)}
                          onMouseDown={()=>onDown(row.id,"act",s)}
                          onMouseEnter={()=>onEnter(row.id,"act",s)}
                        />
                      ))}
                    </tr>
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>

        <div className="actions">
          <button className="btn" style={{background:"#29b6f6"}} onClick={addRow}>+ Tambah Baris</button>
          <button className="btn" style={{background:"#78909c"}} onClick={exportCSV}>⬇ Export CSV</button>
        </div>

        <p className="tip">Tip: Klik sel untuk toggle • Drag untuk mengisi banyak sel • Klik nama item untuk mengedit</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
