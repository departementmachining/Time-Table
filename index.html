<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planing Perbaikan Kebocoran Coolant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; }
    .app { min-height: 100vh; padding: 32px 16px; }
    .card {
      max-width: 1100px; margin: 0 auto; background: #fff;
      border-radius: 12px; box-shadow: 0 4px 24px #b0bec540;
      padding: 28px 28px 36px;
    }
    .title-area { text-align: center; margin-bottom: 24px; }
    .title-text {
      font-size: 18px; font-weight: 700; color: #1a237e;
      cursor: pointer; display: inline-block;
      border-bottom: 2px dashed transparent; transition: border 0.2s;
    }
    .title-text:hover { border-bottom-color: #29b6f6; }
    .title-input {
      font-size: 18px; font-weight: 700; border: none;
      border-bottom: 2px solid #29b6f6; outline: none;
      text-align: center; width: 80%; color: #1a237e; background: transparent;
    }
    .legend {
      display: flex; gap: 20px; margin-bottom: 14px;
      justify-content: flex-end; font-size: 13px; align-items: center; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-box { width: 18px; height: 14px; border-radius: 3px; display: inline-block; }
    .legend-tip { color: #90a4ae; font-size: 12px; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; min-width: 820px; width: 100%; }
    th {
      border: 1px solid #cfd8dc; background: #e3f2fd;
      padding: 6px 8px; text-align: center;
      font-size: 13px; font-weight: 600; color: #1a237e;
    }
    .type-cell {
      border: 1px solid #cfd8dc; padding: 2px 8px; font-size: 12px;
      color: #546e7a; text-align: center; white-space: nowrap;
      background: #eceff1; width: 52px;
    }
    .item-cell {
      border: 1px solid #cfd8dc; padding: 4px 10px;
      vertical-align: middle; font-weight: 500;
      font-size: 13px; color: #263238;
    }
    .item-name {
      cursor: pointer; border-bottom: 1px dashed #90a4ae;
    }
    .item-input {
      width: 100%; border: 1px solid #29b6f6; border-radius: 4px;
      padding: 2px 6px; font-size: 13px;
    }
    .gantt-cell {
      width: 60px; height: 28px; border: 1px solid #cfd8dc;
      cursor: pointer; transition: background 0.12s; user-select: none;
    }
    .action-cell {
      border: 1px solid #cfd8dc; text-align: center; vertical-align: middle; width: 60px;
    }
    .actions { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
    .btn {
      color: #fff; border: none; border-radius: 6px;
      padding: 8px 18px; cursor: pointer; font-size: 14px;
      font-weight: 600; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-sm {
      color: #fff; border: none; border-radius: 6px;
      padding: 4px 10px; cursor: pointer; font-size: 13px;
      font-weight: 600; transition: opacity 0.15s;
    }
    .btn-sm:hover { opacity: 0.85; }
    .tip { font-size: 11px; color: #b0bec5; margin-top: 18px; text-align: right; }
    tr.even { background: #f9fbe7; }
    tr.odd { background: #fff; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const DEFAULT_TIME_SLOTS = [
  "13.00","13.30","14.00","14.30","15.00","15.30",
  "16.00","16.30","17.00","17.30","18.00","18.30"
];

const DEFAULT_ROWS = [
  { id: 1, item: "Lepas Spindle",            plan: ["13.00","13.30","14.00","14.30"], act: [] },
  { id: 2, item: "Ganti Seal Spindle collant", plan: ["14.30","15.00"],              act: [] },
  { id: 3, item: "pasang Spindle",            plan: ["15.00","15.30","16.00"],       act: [] },
  { id: 4, item: "Centering pin",             plan: ["16.00","16.30"],               act: [] },
  { id: 5, item: "Tes Semburan Coolant",      plan: ["17.00"],                       act: [] },
  { id: 6, item: "Trial Bubut",               plan: ["17.30"],                       act: [] },
];

const PLAN_COLOR  = "#29b6f6";
const ACT_COLOR   = "#66bb6a";
const PLAN_HOVER  = "#039be5";
const ACT_HOVER   = "#43a047";

function GanttCell({ filled, isPlan, isHovered, onMouseDown, onMouseEnter, onMouseLeave, onClick }) {
  const base  = isPlan ? PLAN_COLOR : ACT_COLOR;
  const hover = isPlan ? PLAN_HOVER : ACT_HOVER;
  const bg = filled
    ? (isHovered ? hover : base)
    : (isHovered ? "#eceff1" : "#fff");
  return (
    <td
      className="gantt-cell"
      style={{ backgroundColor: bg }}
      onClick={onClick}
      onMouseDown={onMouseDown}
      onMouseEnter={onMouseEnter}
      onMouseLeave={onMouseLeave}
    />
  );
}

function App() {
  const [title, setTitle]             = useState("Planing Perbaikan Kebocoran Coolant di Spindle DR 303");
  const [editingTitle, setEditingTitle] = useState(false);
  const [rows, setRows]               = useState(DEFAULT_ROWS);
  const [timeSlots]                   = useState(DEFAULT_TIME_SLOTS);
  const [hoveredCell, setHoveredCell] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [itemDraft, setItemDraft]     = useState("");
  const [dragState, setDragState]     = useState(null);

  function toggleCell(rowId, type, slot) {
    setRows(prev => prev.map(r => {
      if (r.id !== rowId) return r;
      const arr = r[type];
      return { ...r, [type]: arr.includes(slot) ? arr.filter(s => s !== slot) : [...arr, slot] };
    }));
  }

  function handleMouseDownCell(rowId, type, slot) {
    const row = rows.find(r => r.id === rowId);
    const filling = !row[type].includes(slot);
    setDragState({ rowId, type, filling });
    setRows(prev => prev.map(r => {
      if (r.id !== rowId) return r;
      const arr = r[type];
      return { ...r, [type]: filling ? (arr.includes(slot) ? arr : [...arr, slot]) : arr.filter(s => s !== slot) };
    }));
  }

  function handleMouseEnterCell(rowId, type, slot) {
    setHoveredCell({ rowId, type, slot });
    if (!dragState || dragState.rowId !== rowId || dragState.type !== type) return;
    setRows(prev => prev.map(r => {
      if (r.id !== rowId) return r;
      const arr = r[type];
      return dragState.filling
        ? { ...r, [type]: arr.includes(slot) ? arr : [...arr, slot] }
        : { ...r, [type]: arr.filter(s => s !== slot) };
    }));
  }

  function addRow() {
    const newId = Date.now();
    setRows(prev => [...prev, { id: newId, item: "Item baru", plan: [], act: [] }]);
    setEditingItem(newId);
    setItemDraft("Item baru");
  }

  function deleteRow(id) {
    setRows(prev => prev.filter(r => r.id !== id));
  }

  function saveItem(id) {
    setRows(prev => prev.map(r => r.id === id ? { ...r, item: itemDraft } : r));
    setEditingItem(null);
  }

  function exportCSV() {
    const header = ["Item kerja","Type",...timeSlots].join(",");
    const body = rows.flatMap(r => [
      [r.item,"Plan",...timeSlots.map(s => r.plan.includes(s) ? "1" : "0")].join(","),
      [r.item,"Act", ...timeSlots.map(s => r.act.includes(s)  ? "1" : "0")].join(","),
    ]);
    const csv  = [header,...body].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "planing.csv"; a.click();
  }

  return (
    <div className="app" onMouseUp={() => setDragState(null)}>
      <div className="card">

        {/* Title */}
        <div className="title-area">
          {editingTitle ? (
            <input
              className="title-input"
              value={title}
              autoFocus
              onChange={e => setTitle(e.target.value)}
              onBlur={() => setEditingTitle(false)}
              onKeyDown={e => e.key === "Enter" && setEditingTitle(false)}
            />
          ) : (
            <h1 className="title-text" onClick={() => setEditingTitle(true)} title="Klik untuk edit judul">
              {title} ✏️
            </h1>
          )}
        </div>

        {/* Legend */}
        <div className="legend">
          <span className="legend-item">
            <span className="legend-box" style={{ background: PLAN_COLOR }} /> Plan
          </span>
          <span className="legend-item">
            <span className="legend-box" style={{ background: ACT_COLOR }} /> Act
          </span>
          <span className="legend-tip">Klik / drag sel untuk mengisi</span>
        </div>

        {/* Table */}
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th rowSpan="2" style={{ width: 160 }}>Item kerja</th>
                <th rowSpan="2" style={{ width: 52 }}>Type</th>
                <th colSpan={timeSlots.length}>Jam</th>
                <th rowSpan="2" style={{ width: 60 }}>Aksi</th>
              </tr>
              <tr>
                {timeSlots.map(s => <th key={s} style={{ width: 60, fontWeight: 500, fontSize: 12 }}>{s}</th>)}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, idx) => {
                const rowClass = idx % 2 === 0 ? "even" : "odd";
                const bgColor  = idx % 2 === 0 ? "#f9fbe7" : "#fff";
                return (
                  <React.Fragment key={row.id}>
                    {/* Plan row */}
                    <tr className={rowClass}>
                      <td className="item-cell" rowSpan="2" style={{ background: bgColor }}>
                        {editingItem === row.id ? (
                          <input
                            className="item-input"
                            value={itemDraft}
                            autoFocus
                            onChange={e => setItemDraft(e.target.value)}
                            onBlur={() => saveItem(row.id)}
                            onKeyDown={e => e.key === "Enter" && saveItem(row.id)}
                          />
                        ) : (
                          <span
                            className="item-name"
                            title="Klik untuk edit nama"
                            onClick={() => { setEditingItem(row.id); setItemDraft(row.item); }}
                          >{row.item}</span>
                        )}
                      </td>
                      <td className="type-cell">Plan</td>
                      {timeSlots.map(s => (
                        <GanttCell
                          key={s}
                          filled={row.plan.includes(s)}
                          isPlan={true}
                          isHovered={hoveredCell?.rowId===row.id && hoveredCell?.type==="plan" && hoveredCell?.slot===s}
                          onClick={() => toggleCell(row.id, "plan", s)}
                          onMouseDown={() => handleMouseDownCell(row.id, "plan", s)}
                          onMouseEnter={() => handleMouseEnterCell(row.id, "plan", s)}
                          onMouseLeave={() => setHoveredCell(null)}
                        />
                      ))}
                      <td className="action-cell" rowSpan="2">
                        <button
                          className="btn-sm"
                          style={{ background: "#ef5350" }}
                          title="Hapus baris"
                          onClick={() => deleteRow(row.id)}
                        >✕</button>
                      </td>
                    </tr>
                    {/* Act row */}
                    <tr className={rowClass}>
                      <td className="type-cell">Act</td>
                      {timeSlots.map(s => (
                        <GanttCell
                          key={s}
                          filled={row.act.includes(s)}
                          isPlan={false}
                          isHovered={hoveredCell?.rowId===row.id && hoveredCell?.type==="act" && hoveredCell?.slot===s}
                          onClick={() => toggleCell(row.id, "act", s)}
                          onMouseDown={() => handleMouseDownCell(row.id, "act", s)}
                          onMouseEnter={() => handleMouseEnterCell(row.id, "act", s)}
                          onMouseLeave={() => setHoveredCell(null)}
                        />
                      ))}
                    </tr>
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Actions */}
        <div className="actions">
          <button className="btn" style={{ background: "#29b6f6" }} onClick={addRow}>+ Tambah Baris</button>
          <button className="btn" style={{ background: "#78909c" }} onClick={exportCSV}>⬇ Export CSV</button>
        </div>

        <p className="tip">
          Tip: Klik sel untuk toggle • Drag untuk mengisi banyak sel sekaligus • Klik nama item untuk mengedit
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
