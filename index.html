<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planing Perbaikan Kebocoran Coolant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; padding: 32px 16px; }
    .card {
      max-width: 1100px; margin: 0 auto; background: #fff;
      border-radius: 12px; box-shadow: 0 4px 24px rgba(176,190,197,0.25);
      padding: 28px 28px 36px;
    }
    h1 {
      text-align: center; font-size: 18px; font-weight: 700;
      color: #1a237e; margin-bottom: 24px; cursor: pointer;
    }
    #title-input {
      display: none; font-size: 18px; font-weight: 700; border: none;
      border-bottom: 2px solid #29b6f6; outline: none;
      text-align: center; width: 80%; color: #1a237e; background: transparent;
      margin: 0 auto 24px; display: none;
    }
    .legend {
      display: flex; gap: 20px; margin-bottom: 14px;
      justify-content: flex-end; font-size: 13px; align-items: center;
    }
    .legend-box { width: 18px; height: 14px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 4px; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; }
    th {
      border: 1px solid #cfd8dc; background: #e3f2fd;
      padding: 6px 8px; text-align: center;
      font-size: 13px; font-weight: 600; color: #1a237e; white-space: nowrap;
    }
    td { border: 1px solid #cfd8dc; }
    td.label-cell {
      padding: 2px 8px; font-size: 12px; color: #546e7a;
      text-align: center; background: #eceff1; white-space: nowrap; width: 52px;
    }
    td.item-cell {
      padding: 4px 10px; font-size: 13px; font-weight: 500;
      color: #263238; width: 160px; vertical-align: middle; cursor: pointer;
    }
    td.item-cell:hover { background: #e3f2fd; }
    td.action-cell { text-align: center; width: 60px; vertical-align: middle; }
    td.gantt {
      width: 60px; min-width: 60px; height: 28px;
      cursor: pointer; background-color: #ffffff;
    }
    td.gantt:hover { background-color: #e0e0e0 !important; }
    td.gantt.filled-plan { background-color: #29b6f6 !important; }
    td.gantt.filled-plan:hover { background-color: #039be5 !important; }
    td.gantt.filled-act  { background-color: #66bb6a !important; }
    td.gantt.filled-act:hover  { background-color: #43a047 !important; }
    .btn-del {
      color: #fff; background: #ef5350; border: none; border-radius: 6px;
      padding: 4px 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .btn-del:hover { background: #c62828; }
    .actions { display: flex; gap: 12px; margin-top: 22px; }
    .btn {
      color: #fff; border: none; border-radius: 6px;
      padding: 8px 18px; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .tip { font-size: 11px; color: #b0bec5; margin-top: 18px; text-align: right; }
    .item-edit-input {
      width: 100%; border: 1px solid #29b6f6; border-radius: 4px;
      padding: 2px 6px; font-size: 13px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1 id="title" onclick="editTitle()">Planing Perbaikan Kebocoran Coolant di Spindle DR 303 ✏️</h1>
  <input id="title-input" type="text" onblur="saveTitle()" onkeydown="if(event.key==='Enter')saveTitle()" />

  <div class="legend">
    <span><span class="legend-box" style="background:#29b6f6"></span>Plan</span>
    <span><span class="legend-box" style="background:#66bb6a"></span>Act</span>
    <span style="color:#90a4ae;font-size:12px">Klik / drag sel untuk mengisi</span>
  </div>

  <div class="table-wrap">
    <table id="gantt-table">
      <thead>
        <tr>
          <th rowspan="2" style="width:160px">Item kerja</th>
          <th rowspan="2" style="width:52px">Type</th>
          <th colspan="12">Jam</th>
          <th rowspan="2" style="width:60px">Aksi</th>
        </tr>
        <tr id="time-header"></tr>
      </thead>
      <tbody id="gantt-body"></tbody>
    </table>
  </div>

  <div class="actions">
    <button class="btn" style="background:#29b6f6" onclick="addRow()">+ Tambah Baris</button>
    <button class="btn" style="background:#78909c" onclick="exportCSV()">⬇ Export CSV</button>
  </div>
  <p class="tip">Tip: Klik sel untuk toggle • Drag untuk mengisi banyak sel • Klik nama item untuk mengedit</p>
</div>

<script>
const TIME_SLOTS = ["13.00","13.30","14.00","14.30","15.00","15.30","16.00","16.30","17.00","17.30","18.00","18.30"];

let rows = [
  { id:1, item:"Lepas Spindle",              plan:["13.00","13.30","14.00","14.30"], act:[] },
  { id:2, item:"Ganti Seal Spindle collant", plan:["14.30","15.00"],                act:[] },
  { id:3, item:"pasang Spindle",             plan:["15.00","15.30","16.00"],        act:[] },
  { id:4, item:"Centering pin",              plan:["16.00","16.30"],                act:[] },
  { id:5, item:"Tes Semburan Coolant",       plan:["17.00"],                        act:[] },
  { id:6, item:"Trial Bubut",               plan:["17.30"],                        act:[] },
];

let dragState = null;

// Build time header
const hdr = document.getElementById("time-header");
TIME_SLOTS.forEach(s => {
  const th = document.createElement("th");
  th.textContent = s;
  th.style.width = "60px";
  th.style.fontWeight = "500";
  th.style.fontSize = "12px";
  hdr.appendChild(th);
});

function render() {
  const tbody = document.getElementById("gantt-body");
  tbody.innerHTML = "";

  rows.forEach((row, idx) => {
    const bg = idx % 2 === 0 ? "#f9fbe7" : "#ffffff";

    // ---- PLAN row ----
    const trPlan = document.createElement("tr");

    // Item cell (rowspan 2)
    const tdItem = document.createElement("td");
    tdItem.className = "item-cell";
    tdItem.rowSpan = 2;
    tdItem.style.background = bg;
    tdItem.textContent = row.item;
    tdItem.title = "Klik untuk edit nama";
    tdItem.onclick = () => startEditItem(row.id, tdItem);
    trPlan.appendChild(tdItem);

    // Label Plan
    const tdLabelPlan = document.createElement("td");
    tdLabelPlan.className = "label-cell";
    tdLabelPlan.textContent = "Plan";
    trPlan.appendChild(tdLabelPlan);

    // Plan gantt cells
    TIME_SLOTS.forEach(slot => {
      const td = document.createElement("td");
      td.className = "gantt" + (row.plan.includes(slot) ? " filled-plan" : "");
      td.dataset.id = row.id;
      td.dataset.type = "plan";
      td.dataset.slot = slot;
      td.addEventListener("mousedown", handleMouseDown);
      td.addEventListener("mouseenter", handleMouseEnter);
      trPlan.appendChild(td);
    });

    // Action cell (rowspan 2)
    const tdAction = document.createElement("td");
    tdAction.className = "action-cell";
    tdAction.rowSpan = 2;
    tdAction.style.background = bg;
    const btnDel = document.createElement("button");
    btnDel.className = "btn-del";
    btnDel.textContent = "✕";
    btnDel.onclick = () => { rows = rows.filter(r => r.id !== row.id); render(); };
    tdAction.appendChild(btnDel);
    trPlan.appendChild(tdAction);

    tbody.appendChild(trPlan);

    // ---- ACT row ----
    const trAct = document.createElement("tr");

    // Label Act
    const tdLabelAct = document.createElement("td");
    tdLabelAct.className = "label-cell";
    tdLabelAct.textContent = "Act";
    trAct.appendChild(tdLabelAct);

    // Act gantt cells
    TIME_SLOTS.forEach(slot => {
      const td = document.createElement("td");
      td.className = "gantt" + (row.act.includes(slot) ? " filled-act" : "");
      td.dataset.id = row.id;
      td.dataset.type = "act";
      td.dataset.slot = slot;
      td.addEventListener("mousedown", handleMouseDown);
      td.addEventListener("mouseenter", handleMouseEnter);
      trAct.appendChild(td);
    });

    tbody.appendChild(trAct);
  });
}

function handleMouseDown(e) {
  const id   = parseInt(e.target.dataset.id);
  const type = e.target.dataset.type;
  const slot = e.target.dataset.slot;
  const row  = rows.find(r => r.id === id);
  const filling = !row[type].includes(slot);
  dragState = { id, type, filling };
  toggleSlot(id, type, slot, filling);
  e.preventDefault();
}

function handleMouseEnter(e) {
  if (!dragState) return;
  const id   = parseInt(e.target.dataset.id);
  const type = e.target.dataset.type;
  const slot = e.target.dataset.slot;
  if (id !== dragState.id || type !== dragState.type) return;
  toggleSlot(id, type, slot, dragState.filling);
}

document.addEventListener("mouseup", () => { dragState = null; });

function toggleSlot(id, type, slot, filling) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  const arr = row[type];
  if (filling && !arr.includes(slot)) {
    arr.push(slot);
  } else if (!filling && arr.includes(slot)) {
    row[type] = arr.filter(s => s !== slot);
  }
  // Update only the affected cell directly (no full re-render = no flicker)
  const cells = document.querySelectorAll(`td.gantt[data-id="${id}"][data-type="${type}"][data-slot="${slot}"]`);
  cells.forEach(td => {
    td.className = "gantt" + (row[type].includes(slot) ? ` filled-${type}` : "");
  });
}

function startEditItem(id, tdEl) {
  const row = rows.find(r => r.id === id);
  const input = document.createElement("input");
  input.className = "item-edit-input";
  input.value = row.item;
  tdEl.textContent = "";
  tdEl.appendChild(input);
  input.focus();
  input.select();
  const save = () => {
    row.item = input.value || row.item;
    tdEl.textContent = row.item;
    tdEl.onclick = () => startEditItem(id, tdEl);
  };
  input.onblur = save;
  input.onkeydown = e => { if (e.key === "Enter") input.blur(); };
  tdEl.onclick = null;
}

function addRow() {
  const id = Date.now();
  rows.push({ id, item: "Item baru", plan: [], act: [] });
  render();
  // Auto-edit the new item name
  const cells = document.querySelectorAll("td.item-cell");
  const last = cells[cells.length - 1];
  if (last) startEditItem(id, last);
}

function editTitle() {
  const h1 = document.getElementById("title");
  const inp = document.getElementById("title-input");
  inp.value = h1.textContent.replace(" ✏️","").trim();
  h1.style.display = "none";
  inp.style.display = "block";
  inp.focus(); inp.select();
}

function saveTitle() {
  const h1 = document.getElementById("title");
  const inp = document.getElementById("title-input");
  h1.textContent = (inp.value.trim() || h1.textContent.replace(" ✏️","").trim()) + " ✏️";
  h1.style.display = "";
  inp.style.display = "none";
}

function exportCSV() {
  const hdr  = ["Item kerja","Type",...TIME_SLOTS].join(",");
  const body = rows.flatMap(r => [
    [r.item,"Plan",...TIME_SLOTS.map(s=>r.plan.includes(s)?"1":"0")].join(","),
    [r.item,"Act", ...TIME_SLOTS.map(s=>r.act.includes(s) ?"1":"0")].join(","),
  ]);
  const blob = new Blob([[hdr,...body].join("\n")],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "planing.csv"; a.click();
}

// Initial render
render();
</script>
</body>
</html>
